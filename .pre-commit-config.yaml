repos:
  - repo: local
    hooks:
      - id: gitleaks
        name: gitleaks
        entry: bash -c 'gitleaks detect --config=.gitleaks.toml --verbose'
        language: system
        pass_filenames: false
  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        entry: bash -c 'golangci-lint run ./...'
        language: system
        files: '\.go$'
        pass_filenames: false